version: "3.8"

services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: sieveon-surrealdb
    ports:
      - "8000:8000"
    user: root
    environment:
      SURREAL_PATH: mem:///data/surrealdb?versioned=true&aol=sync&snapshot=60s&sync=5s
    command: start --log info --user ${SURREALDB_USER:-root} --pass ${SURREALDB_PASS:-root}
    restart: unless-stopped
    volumes:
      - surrealdb-data:/data
      - ./docs/schema.surql:/schema.surql:ro

volumes:
  surrealdb-data:
